<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>DISPLAY</title>
</head>

<body>
    <!--DISPLAY-->
    <div class="inline-box">a</div>
    <div class="inline-box">b</div>
    <div class="inline-box">c</div>
    <br>
    <br>


    <div class="sticky">
        <span>Sou sticky</span>
    </div>


    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>

    <!--ESCONDENDO ELEMENTOS-->
    <p class="invisible">Me encontre</p>


    <br>
    <br>
    <br>
    <br>
    <br>
    <br>

    <!--POSIÇÕES STATIC-->
    <div class="static">
        <span>Eu sou static</span>
    </div>

    <br>
    <br>
    <br>
    <br>
    <br>
    <br>

    <!--RELATIVE-->
    <div class="relative">Eu sou relativo</div>

    <br>
    <br>
    <br>
    <br>
    <br>
    <br>

    <!--ABSOLUTE-->
    <div class="absolute">
        <span>Eu sou absoluto</span>
    </div>

    <br>
    <br>
    <br>
    <br>
    <br>
    <br>

    <!--ABSOLUTE COM RELATIVE-->
    <div class="relativa-container">
        <div class="absolute-1"></div>
        <div class="absolute-2"></div>
    </div>

    <br>
    <br>
    <br>
    <br>
    <br>
    <br>

    <!--POSITION FIXED-->
    <div class="fixed">
        <span>Fixed</span>
    </div>


    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>


    <div class="relativa-container">
        <div class="absolute-3"></div>
        <div class="absolute-4"></div>
        <div class="absolute-5"></div>
    </div>
</body>

</html>
